<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canteen Pax Predictor</title>
    <link rel="icon" href="/static/images/logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&family=Smooch+Sans:wght@100..900&display=swap" rel="stylesheet">
    <style>
        :root{
    --color-primary: #42603b;
    --color-half:#a8c69e;
    --color-success: #41f1b6;
    --color-warning:#ffbb55;
    --color-white: #fff;
    --color-info-dark:#7d8da1;
    --color-info-light: #dce1eb;
    --color-dark:#363949;
    --color-light: rgba(132,139,200,0.18);
    --color-primary-variant:#111e88;
    --color-dark-variant: #677483;
    --color-background:#ffffff;
    --card-border-radius: 2rem;
    --border-radius-1: 0.4rem;
    --border-radius-2: 0.8rem;
    --border-radius-3: 1.2rem;
    --card-padding: 2.5rem 2rem;
    --padding-1: 1.2rem;
    --box-shadow: 0 1rem 2rem var(--color-light);
}
html{
    font-size: 14px;
}
body{
    width: 100vw;
    height: 100vh;
    font-size: 0.88rem;
    background: var(--color-background);
    user-select: none;
    overflow-x: hidden;
}
*{
    margin: 0;
    padding: 0;
    outline: 0;
    appearance: none;
    border: 0;
    text-decoration: none;
    list-style: none;
    box-sizing: border-box;
    font-family: 'montserrat';
}
.container{
    display: grid;
    width: 96%;
    margin: 0 auto;
    gap: 1.8rem;
    grid-template-columns: 14rem auto 23rem;
}
a{
    color: var(--color-dark);
}
img{
    display: block;
    width: 100%;
}
h1{
    font-weight: 800;
    font-size: 1.8rem;
}
h2{
    font-size: 1.4rem;
}
h3{
    font-size: 0.8rem;
}
h5{
    font-size: 0.7rem;
}
small{
    font-size: 0.75rem;
}
.profile-photo{
    width: 2.8rem;
    height: 2.8rem;
    border-radius: 50%;
    overflow: hidden;
}
.text-muted{
    color: var(--color-info-dark);
}
p{
    color: var(--color-dark-variant);
}
b{
    color: var(--color-dark);
}
.primary{
    color: var(--color-primary);
}
.half{
    color: var(--color-half);
}
.success{
    color: var(--color-success);
}
.warning{
    color: var(--color-warning);
}
aside{
    height: 100vh;
}
aside .top{
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 1.4rem;
    padding: 0 1rem;
}
aside h2{
    margin: 0;
    font-size: 1.4rem;
    font-weight: 600;
}
aside .logo{
    display: flex;
    gap: 0.8rem;
    align-items: center;
}
aside .logo img{
    width: 2rem;
    height: 2rem;
}
aside .close-btn{
    display: none;
    font-size: 2rem;
}
aside .sidebar{
    display: flex;
    flex-direction: column;
    height: 86vh;
    position: relative;
    top: 3rem;
}
aside h3{
    font-weight: 500;
}
aside .sidebar a{
    display: flex;
    color: var(--color-info-dark);
    margin-left: 2rem;
    gap: 1rem;
    align-items: center;
    position: relative;
    height: 3.7rem;
    transition: all 300ms ease;
}
aside .sidebar a i{
    font-size: 1.6rem;
    transition: all 300ms ease; 
}
aside .sidebar a:last-child{
    position: absolute;
    bottom: 2rem;
    width: 100%;
}
aside .sidebar a.active{
    background: var(--color-light);
    color: var(--color-primary);
    margin-left: 0;
}
.card {
    background: #fff;
    border-radius: var(--card-border-radius);
    box-shadow: var(--box-shadow);
    padding: var(--card-padding);
    margin: 2rem auto;
    max-width: 500px;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: stretch;
}
.card h1 {
    font-size: 2rem;
    font-weight: 800;
    margin-bottom: 1.2em;
    text-align: center;
}
.card .settings-link {
    display: block;
    margin-bottom: 2em;
    text-align: center;
}
.card .btn-submit {
    background: linear-gradient(90deg, var(--color-primary) 60%, var(--color-half) 100%);
    color: #fff;
    border: none;
    border-radius: var(--border-radius-1);
    padding: 1em 0;
    font-size: 1.1em;
    font-weight: 600;
    cursor: pointer;
    margin-top: 1.5em;
    width: 100%;
    transition: background 0.2s;
}
.card .btn-submit:hover {
    background: linear-gradient(90deg, var(--color-half) 0%, var(--color-primary) 100%);
}
.form-group {
    margin-bottom: 1.5em;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
}
.form-group label {
    font-weight: 600;
    margin-bottom: 0.5em;
    color: var(--color-dark);
}
.form-group input[type="number"],
.form-group input[type="date"] {
    width: 100%;
    padding: 0.8em 1em;
    border: 1.5px solid var(--color-info-light);
    border-radius: var(--border-radius-1);
    font-size: 1em;
    background: var(--color-light);
    color: var(--color-dark);
    transition: border-color 0.2s, background 0.2s;
}
.form-group input:focus {
    border-color: var(--color-primary);
    background: #f0f7f0;
}
.result {
    margin-top: 2em;
    padding: 1.2em;
    background: #e9f7ef;
    border: 1px solid #b2dfdb;
    border-radius: var(--border-radius-1);
    display: none;
    font-size: 1.1em;
}
.right {
    margin-top: 1.4rem;
}
.right .top {
    display: flex;
    justify-content: end;
    gap: 2rem;
}
.right .top button {
    display: none;
}
.right .top .profile {
    display: flex;
    text-align: right;
    gap: 0.5rem;
}
.right .top .profile .info {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
}
.right .top .profile .info p {
    margin: 0;
    font-weight: 400;
    color: var(--color-dark);
}
.right .top .profile .info small {
    color: var(--color-info-dark);
}
.right .profile-photo {
    width: 2.8rem;
    height: 2.8rem;
    border-radius: 50%;
    overflow: hidden;
}
.right .profile-photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}
.coming-soon {
    background: #ffbb55;
    color: #fff;
    font-size: 0.62em;
    padding: 1px 6px;
    border-radius: 6px;
    margin-left: 6px;
    font-weight: 600;
    letter-spacing: 0.2px;
    display: inline-block;
    vertical-align: middle;
}
    </style>
</head>
<body>
    <div class="container">
        <aside>
            <div class="top">
                <div class="logo">
                    <a href="/dashboard" style="display: flex; gap: 0.8rem; align-items: center; text-decoration: none; color: inherit;">
                        <img src="/static/images/logo.png" alt="">
                        <h2>REF<span class="half">EEDO</span></h2>
                    </a>
                </div>
                <div class="close-btn"><i class="fa-solid fa-xmark"></i></div>
            </div>
            <div class="sidebar">
                <a href="/dashboard" class=""><i class="fa-solid fa-table-columns"></i><h3>DashBoard</h3></a>
                <a href="/menu" class=""><i class="fa-solid fa-plate-wheat"></i><h3>Menu Management</h3></a>
                <a href="/bom" class=""><i class="fa-solid fa-paperclip"></i><h3>BOM</h3></a>
                <a href="/studentstaff" class=""><i class="fa-regular fa-folder-closed"></i><h3>Student and Staff <span class="coming-soon">Coming Soon</span></h3></a>
                <a href="/inventory" class=""><i class="fa-regular fa-cart-flatbed"></i><h3>Inventory</h3></a>
                <a href="/supplier" class=""><i class="fa-solid fa-boxes-packing"></i><h3>Supplier <span class="coming-soon">Coming Soon</span></h3></a>
                <a href="/analytics" class=""><i class="fa-solid fa-chart-line"></i><h3>Analytics <span class="coming-soon">Coming Soon</span></h3></a>
                <a href="/pax" class="active"><i class="fa-solid fa-utensils"></i><h3>Meal Predictor</h3></a>
                <a href="/settings" class=""><i class="fa-solid fa-gear"></i><h3>Settings</h3></a>
                <a href="/logout"><i class="fa-solid fa-arrow-right-from-bracket"></i><h3>Log Out</h3></a>
            </div>
        </aside>
        <main>
            <div class="card">
                <h1>Canteen Pax Predictor</h1>
                <div style="display: flex; flex-direction: column; align-items: center; margin-bottom: 1em;">
                    <span class="coming-soon" style="margin-bottom: 0.5em;">Coming Soon</span>
                    <a href="/pax_settings" target="_blank" class="settings-link" style="width: 100%;">
                        <button type="button" class="btn-submit" style="width: 100%;">Pax Settings</button>
                    </a>
                </div>
                <form id="predict-form">
                    <div class="form-group">
                        <label for="total_present">Total Present Students:</label>
                        <input type="number" id="total_present" name="total_present" required>
                    </div>
                    <div class="form-group">
                        <label for="date">Date:</label>
                        <input type="date" id="date" name="date" required>
                    </div>
                    <button type="submit" class="btn-submit">Predict</button>
                </form>
                <div id="result" class="result"></div>
            </div>
        </main>
        <div class="right">
            <div class="top">
                <button id="menu-btn" style="display:none;"><i class="fa-solid fa-bars"></i></button>
                <div class="profile">
                    <div class="info">
                        <p>Hey,</p>
                        <small class="text-muted">Admin</small>
                    </div>
                    <div class="profile-photo">
                        <img src="/static/images/profile2.jpg" alt="profile">
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        const form = document.getElementById('predict-form');
        if (form) {
            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                const total_present = document.getElementById('total_present').value;
                const date = document.getElementById('date').value;
                const payload = {
                    total_present: parseInt(total_present),
                    date: date
                };
                const res = await fetch('/pax_predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                let data;
                try {
                    data = await res.json();
                } catch (err) {
                    data = { detail: "Invalid JSON response from backend." };
                }
                const resultDiv = document.getElementById('result');
                if (res.ok) {
                    resultDiv.style.display = 'block';
                    resultDiv.innerHTML = `
                        <h2>Predicted Pax</h2>
                        <ul>
                            <li><b>Breakfast:</b> ${data.breakfast}</li>
                            <li><b>Brunch:</b> ${data.brunch}</li>
                            <li><b>Lunch:</b> ${data.lunch}</li>
                            <li><b>Snacks:</b> ${data.snacks}</li>
                            <li><b>Dinner:</b> ${data.dinner}</li>
                        </ul>
                        ${data.notes && data.notes.length ? `<p><b>Notes:</b> ${data.notes.join('<br>')}</p>` : ''}
                    `;
                } else {
                    resultDiv.style.display = 'block';
                    resultDiv.innerHTML = `<b>Error:</b> ${typeof data.detail === 'string' ? data.detail : JSON.stringify(data.detail)}`;
                }
            });
        }
    });
    </script>
</body>
</html>
