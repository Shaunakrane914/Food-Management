<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Canteen Pax Predictor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Settings</h1>
        <h2>Batch Settings</h2>
        <table id="batch-table">
            <thead>
                <tr><th>Batch</th><th>Total Count</th><th>Weekend %</th><th>Action</th></tr>
            </thead>
            <tbody></tbody>
        </table>
        <h2>Exam Rules</h2>
        <table id="exam-table">
            <thead>
                <tr><th>Exam Time</th><th>Meal</th><th>Reduction %</th></tr>
            </thead>
            <tbody></tbody>
        </table>
        <h3>Add Exam Rule</h3>
        <form id="exam-form">
            <input type="time" id="exam_time" required>
            <select id="meal">
                <option>Breakfast</option>
                <option>Brunch</option>
                <option>Lunch</option>
                <option>Snacks</option>
                <option>Dinner</option>
            </select>
            <input type="number" id="reduction" min="0" max="100" placeholder="Reduction %" required>
            <button type="submit">Add Rule</button>
        </form>
        <h2>Exam Dates</h2>
        <table id="examdate-table">
            <thead>
                <tr><th>Date</th><th>Exam Time</th><th>Action</th></tr>
            </thead>
            <tbody></tbody>
        </table>
        <h3>Add Exam Date</h3>
        <form id="examdate-form">
            <input type="date" id="examdate_date" required>
            <input type="time" id="examdate_time" required>
            <button type="submit">Add Exam Date</button>
        </form>
        <a href="index.html">Back to Prediction</a>
    </div>
    <script src="settings.js"></script>
</body>
</html>
